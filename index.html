function gradeColor(grade) {
  const norm = Math.max(-1, Math.min(1, (grade - 50) / 30));
  if (norm <= 0) {
    const f = 1 + norm;
    const r = Math.round(40 * f), g = Math.round(40 * f), b = Math.round(40 + 215 * (1 - f));
    return `rgb(${r},${g},${b})`;
  } else {
    const f = norm;
    const r = Math.round(40 + 215 * f), g = Math.round(40 * (1 - f)), b = Math.round(40 * (1 - f));
    return `rgb(${r},${g},${b})`;
  }
}
function textOn(bg) {
  const m = bg.match(/\d+/g).map(Number);
  return ((0.299*m[0] + 0.587*m[1] + 0.114*m[2]) / 255) > 0.5 ? "#000" : "#fff";
}

let sortCol = "grade";
let sortDir = "desc";

function render() {
  const search = document.getElementById("search").value.trim().toLowerCase();
  const dir = sortDir === "asc" ? 1 : -1;
  const getter = {
    rank: d => d.rank, name: d => d.name, swings: d => d.swings, grade: d => d.grade,
  }[sortCol];
  let rows = [...DATA].sort((a, b) => {
    const va = getter(a), vb = getter(b);
    if (va < vb) return -1 * dir;
    if (va > vb) return 1 * dir;
    return 0;
  });
  if (search) rows = rows.filter(d => d.name.toLowerCase().includes(search));

  document.querySelector("#leaderboard tbody").innerHTML = rows.map(d => {
    const bg = gradeColor(d.grade), fg = textOn(bg);
    return `<tr>
      <td>${d.rank}</td>
      <td><div class="player-cell">
        <img class="headshot" src="${d.headshot}" loading="lazy" onerror="this.style.visibility='hidden'">
        <span>${d.name}<span class="stand"> (${d.stand})</span></span>
      </div></td>
      <td class="num">${d.swings}</td>
      <td class="num"><span class="grade-cell" style="background:${bg};color:${fg}">${d.grade}</span></td>
    </tr>`;
  }).join("");

  document.querySelectorAll("thead th").forEach(th => th.classList.remove("sort-asc", "sort-desc"));
  const active = document.querySelector(`thead th[data-col="${sortCol}"]`);
  if (active) active.classList.add(sortDir === "asc" ? "sort-asc" : "sort-desc");
}

document.getElementById("search").addEventListener("input", render);
document.querySelectorAll("thead th").forEach(th => {
  th.addEventListener("click", () => {
    const col = th.dataset.col;
    if (sortCol === col) sortDir = sortDir === "asc" ? "desc" : "asc";
    else { sortCol = col; sortDir = (col === "name" ? "asc" : "desc"); }
    render();
  });
});
render();
</script>
